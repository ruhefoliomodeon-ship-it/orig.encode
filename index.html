<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>
SLSU - ITSSO Certificate of Manuscript Originality Registry
</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#f1f3f5;
    font-family:Arial, Helvetica, sans-serif;
}

.app-panel{
    width:95%;
    max-width:1400px;
    margin:20px auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

h1{
    margin-top:0;
}

.controls{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:10px;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    border:none;
    padding:12px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    background:#114f20;
    color:#fff;
}

button.secondary{
    background:#4b5563;
}

button.danger{
    background:#b91c1c;
}

button.generate{
    background:#0b4b8f;
}

.table-wrap{
    overflow:auto;
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

th{
    background:#f3f4f6;
}

.action-buttons{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

#certificateWrap{
    display:none;
}

</style>

</head>

<body>

<div class="app-panel">

    <h1>
        SLSU - ITSSO Certificate of Manuscript Originality Registry
    </h1>

    <p>
        Encode manuscript records and generate certificates automatically.
    </p>

    <div class="controls">

        <input id="oidInput" type="text" placeholder="OID">

        <input id="titleInput" type="text" placeholder="Title">

        <input id="authorsInput" type="text" placeholder="Authors">

        <input id="unitInput" type="text" placeholder="Unit">

        <input id="similarityInput" type="number" placeholder="Similarity %">

    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap;">

        <button id="saveBtn">
            Save Record
        </button>

        <button id="exportBtn" class="secondary">
            Export CSV
        </button>

        <button id="showHiddenBtn" class="secondary">
            Show Hidden Records
        </button>

    </div>

    <input
        id="searchInput"
        type="text"
        placeholder="Search records..."
        style="margin-top:20px;"
    >

    <div class="table-wrap">

        <table>

            <thead>

                <tr>

                    <th>OID</th>
                    <th>Title</th>
                    <th>Authors</th>
                    <th>Unit</th>
                    <th>Similarity</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="recordsTable"></tbody>

        </table>

    </div>

</div>

<script>

let records = [];
let editingIndex = -1;

function saveToLocal(){

    localStorage.setItem(
        "slsu_records",
        JSON.stringify(records)
    );
}

function loadLocal(){

    const stored = localStorage.getItem("slsu_records");

    if(stored){

        records = JSON.parse(stored);
    }

    renderTable();
}

function clearInputs(){

    document.getElementById("oidInput").value = "";
    document.getElementById("titleInput").value = "";
    document.getElementById("authorsInput").value = "";
    document.getElementById("unitInput").value = "";
    document.getElementById("similarityInput").value = "";

    editingIndex = -1;
}

function renderTable(filtered = null){

    const tbody = document.getElementById("recordsTable");

    tbody.innerHTML = "";

    const data = filtered || records;

    data.forEach((record,index)=>{

        if(record.hidden){
            return;
        }

        tbody.innerHTML += `

            <tr>

                <td>${record.oid}</td>

                <td>${record.title}</td>

                <td>${record.authors}</td>

                <td>${record.unit}</td>

                <td>${record.similarity}%</td>

                <td>

                    <div class="action-buttons">

                        <button onclick="editRecord(${index})">
                            Edit
                        </button>

                        <button class="danger" onclick="deleteRecord(${index})">
                            Delete
                        </button>

                        <button class="secondary" onclick="toggleHide(${index})">
                            Hide
                        </button>

                        <button class="generate" onclick="generateCertificate(${index})">
                            Generate
                        </button>

                    </div>

                </td>

            </tr>

        `;
    });
}

document.getElementById("saveBtn").addEventListener("click",()=>{

    const oid = document.getElementById("oidInput").value.trim();

    const title = document.getElementById("titleInput").value.trim();

    const authors = document.getElementById("authorsInput").value.trim();

    const unit = document.getElementById("unitInput").value.trim();

    const similarity = document.getElementById("similarityInput").value.trim();

    if(!oid || !title){

        alert("Please complete required fields.");
        return;
    }

    const record = {

        oid,
        title,
        authors,
        unit,
        similarity,
        hidden:false
    };

    if(editingIndex === -1){

        records.push(record);

    }else{

        record.hidden = records[editingIndex].hidden;

        records[editingIndex] = record;
    }

    saveToLocal();

    renderTable();

    clearInputs();

    alert("Record saved successfully.");
});

function editRecord(index){

    const r = records[index];

    document.getElementById("oidInput").value = r.oid;

    document.getElementById("titleInput").value = r.title;

    document.getElementById("authorsInput").value = r.authors;

    document.getElementById("unitInput").value = r.unit;

    document.getElementById("similarityInput").value = r.similarity;

    editingIndex = index;
}

function deleteRecord(index){

    const confirmDelete = confirm("Delete this record?");

    if(confirmDelete){

        records.splice(index,1);

        saveToLocal();

        renderTable();
    }
}

function toggleHide(index){

    records[index].hidden = true;

    saveToLocal();

    renderTable();
}

document.getElementById("showHiddenBtn").addEventListener("click",()=>{

    const tbody = document.getElementById("recordsTable");

    tbody.innerHTML = "";

    const hiddenRecords = records.filter(r => r.hidden);

    hiddenRecords.forEach((record,index)=>{

        tbody.innerHTML += `

            <tr>

                <td>${record.oid}</td>

                <td>${record.title}</td>

                <td>${record.authors}</td>

                <td>${record.unit}</td>

                <td>${record.similarity}%</td>

                <td>

                    <button onclick="unhideRecord('${record.oid}')">
                        Unhide
                    </button>

                </td>

            </tr>

        `;
    });
});

function unhideRecord(oid){

    const record = records.find(r => r.oid === oid);

    if(record){

        record.hidden = false;
    }

    saveToLocal();

    renderTable();
}

document.getElementById("searchInput").addEventListener("input",(e)=>{

    const value = e.target.value.toLowerCase();

    const filtered = records.filter(r =>

        !r.hidden && (

            r.oid.toLowerCase().includes(value) ||

            r.title.toLowerCase().includes(value) ||

            r.authors.toLowerCase().includes(value) ||

            r.unit.toLowerCase().includes(value)
        )
    );

    renderTable(filtered);
});

document.getElementById("exportBtn").addEventListener("click",()=>{

    const exportData = records.filter(r => !r.hidden);

    const csv = Papa.unparse(exportData);

    const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});

    const link = document.createElement("a");

    const url = URL.createObjectURL(blob);

    link.href = url;

    link.download = "records.csv";

    link.click();

    URL.revokeObjectURL(url);
});

function generateCertificate(index){

    const r = records[index];

    alert(
        "Certificate generation placeholder for:\n\n" +
        r.title
    );
}

window.onload = loadLocal;

</script>

</body>
</html>
