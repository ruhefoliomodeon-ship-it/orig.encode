<script>

let records = [];
let currentCertificateIndex = null;
let editingIndex = -1;

loadRecords();

function loadRecords(){

    const saved = localStorage.getItem("slsu_records");

    if(saved){

        records = JSON.parse(saved);
    }

    renderTable();
}

function saveRecords(){

    localStorage.setItem(
        "slsu_records",
        JSON.stringify(records)
    );
}

function clearInputs(){

    $("#oidInput").val("");
    $("#titleInput").val("");
    $("#authorsInput").val("");
    $("#unitInput").val("");
    $("#similarityInput").val("");

    editingIndex = -1;

    $("#saveBtn").text("Save Record");
}

function renderTable(filteredData = null){

    const tbody = $("#recordsTable");

    tbody.html("");

    const data = filteredData || records;

    data.forEach((record,index)=>{

        if(record.hidden){
            return;
        }

        tbody.append(`

            <tr>

                <td>${record.oid}</td>

                <td>${record.title}</td>

                <td>${record.authors}</td>

                <td>${record.similarity}%</td>

                <td>

                    <div class="action-buttons">

                        <button onclick="editRecord(${index})">
                            Edit
                        </button>

                        <button class="danger" onclick="deleteRecord(${index})">
                            Delete
                        </button>

                        <button class="secondary" onclick="hideRecord(${index})">
                            Hide
                        </button>

                        <button class="generate" onclick="generateCertificate(${index})">
                            Generate
                        </button>

                    </div>

                </td>

            </tr>

        `);

    });

}

$("#saveBtn").on("click",function(){

    const oid = $("#oidInput").val().trim();

    const title = $("#titleInput").val().trim();

    const authors = $("#authorsInput").val().trim();

    const unit = $("#unitInput").val().trim();

    const similarity = $("#similarityInput").val().trim();

    if(!oid || !title){

        alert("Please complete required fields.");

        return;
    }

    const record = {

        oid,
        title,
        authors,
        unit,
        similarity,
        hidden:false
    };

    if(editingIndex === -1){

        records.push(record);

    }else{

        record.hidden = records[editingIndex].hidden;

        records[editingIndex] = record;
    }

    saveRecords();

    renderTable();

    clearInputs();

});

function editRecord(index){

    const record = records[index];

    $("#oidInput").val(record.oid);

    $("#titleInput").val(record.title);

    $("#authorsInput").val(record.authors);

    $("#unitInput").val(record.unit);

    $("#similarityInput").val(record.similarity);

    editingIndex = index;

    $("#saveBtn").text("Update Record");
}

function deleteRecord(index){

    const confirmDelete = confirm(
        "Delete this record?"
    );

    if(!confirmDelete){
        return;
    }

    records.splice(index,1);

    saveRecords();

    renderTable();
}

function hideRecord(index){

    records[index].hidden = true;

    saveRecords();

    renderTable();
}

function unhideRecord(index){

    records[index].hidden = false;

    saveRecords();

    renderTable();
}

$("#exportBtn").on("click",function(){

    const visibleRecords = records.filter(
        r => !r.hidden
    );

    const csv = Papa.unparse(visibleRecords);

    const blob = new Blob(
        [csv],
        {type:"text/csv;charset=utf-8;"}
    );

    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);

    link.download = "manuscript_records.csv";

    link.click();
});

$("#searchInput").on("keyup",function(){

    const keyword = $(this)
        .val()
        .toLowerCase();

    const filtered = records.filter(r =>

        !r.hidden && (

            r.oid.toLowerCase().includes(keyword) ||

            r.title.toLowerCase().includes(keyword) ||

            r.authors.toLowerCase().includes(keyword)
        )
    );

    renderTable(filtered);
});

$("body").append(`

<div
    id="hiddenModal"
    style="
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.5);
        z-index:9999;
        padding:40px;
        overflow:auto;
    "
>

    <div
        style="
            background:#fff;
            max-width:1000px;
            margin:auto;
            padding:20px;
            border-radius:12px;
        "
    >

        <h2>Hidden Records</h2>

        <table style="width:100%; border-collapse:collapse;">

            <thead>

                <tr>

                    <th>OID</th>
                    <th>Title</th>
                    <th>Authors</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="hiddenTable"></tbody>

        </table>

        <br>

        <button onclick="closeHiddenModal()">
            Close
        </button>

    </div>

</div>

`);

$(".secondary").after(`

<button
    onclick="showHiddenRecords()"
    class="secondary"
>
    Hidden Records
</button>

`);

function showHiddenRecords(){

    const tbody = $("#hiddenTable");

    tbody.html("");

    records.forEach((record,index)=>{

        if(record.hidden){

            tbody.append(`

                <tr>

                    <td>${record.oid}</td>

                    <td>${record.title}</td>

                    <td>${record.authors}</td>

                    <td>

                        <button onclick="unhideRecord(${index})">
                            Unhide
                        </button>

                    </td>

                </tr>

            `);
        }

    });

    $("#hiddenModal").show();
}

function closeHiddenModal(){

    $("#hiddenModal").hide();
}

function generateCertificate(index){

    currentCertificateIndex = index;

    const record = records[index];

    $(".manuscript-title").text(
        record.title
    );

    $(".submitted-line").text(
        record.authors
    );

    $(".unit-line").text(
        record.unit
    );

    $(".score-value").text(
        record.similarity + "%"
    );

    $(".paper-id").text(
        record.oid
    );

    $("#certificateWrap").show();

    $("#downloadSection").show();

    window.scrollTo({

        top:document.body.scrollHeight,

        behavior:"smooth"
    });
}

async function downloadCurrentPDF(){

    const certificate = document.getElementById(
        "certificate"
    );

    const canvas = await html2canvas(
        certificate,
        {
            scale:2,
            useCORS:true
        }
    );

    const imgData = canvas.toDataURL(
        "image/png"
    );

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF(
        "p",
        "mm",
        "a4"
    );

    const width = 210;

    const height = 297;

    pdf.addImage(
        imgData,
        "PNG",
        0,
        0,
        width,
        height
    );

    const record = records[currentCertificateIndex];

    pdf.save(
        `${record.oid}.pdf`
    );
}

</script>
